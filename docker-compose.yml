services:
  postgres:
    image: postgres:16-alpine
    container_name: sharedbudget-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sharedbudget
      POSTGRES_PASSWORD: sharedbudget
      POSTGRES_DB: sharedbudget
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
